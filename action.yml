name: "Just release it! 📦"
description: "Easiest-to-setup GitHub release for python projects - just read version from pyproject.toml, build changelog and release it!"
author: "Lex Darlog"

branding:
  # https://feathericons.com/
  icon: package
#  icon: tag
#  icon: code
  color: green
#  color: blue
#  color: gray-dark

inputs:
  project-toml-file:
    description: 'Path to a TOML file to extract version from.'
    required: false
    default: 'pyproject.toml'
  project-toml-version-field:
    description: "A specific field in TOML file to read version from."
    required: false
    default: 'project.version'
  attach-files:
    description: 'Glob of files to attach (e.g. "dist/*"). Leave empty (default) for source-only release.'
    required: false
    default: ''
  cat-breaking:
    description: 'The title used for "Breaking Changes" category.'
    required: false
    default: '💥 Breaking Changes 💥'
  cat-depr:
    description: 'The title used for "Deprecations" category.'
    required: false
    default: '⚠️ Deprecations'
  cat-revert:
    description: 'The title used for "Reverts/rollbacks" category.'
    required: false
    default: '↩️ Rollbacks'
    # ⏮️↩️↶❌🔙
  cat-feat:
    description: 'The title used for "New Features" category.'
    required: false
    default: '✨ New Features'
  cat-enhance:
    description: 'The title used for "Improvements/enhancements" category.'
    required: false
    default: '🚀 Improvements'
  cat-fix:
    description: 'The title used for "Fixes" category.'
    required: false
    default: '🛠️ Fixes'
  cat-perf:
    description: 'The title used for "Performance" category.'
    required: false
    default: '⚡ Performance'
  cat-security:
    description: 'The title used for "Security" category.'
    required: false
    default: '🔒 Security'
  cat-doc:
    description: 'The title used for "Documentation" category.'
    required: false
    default: '📝 Documentation'
  cat-refactor:
    description: 'The title used for "Refactor" category.'
    required: false
    default: '♻️ Refactor'
  cat-test:
    description: 'The title used for "Tests" category.'
    required: false
    default: '🔬 Tests'
    # 🧪
  cat-style:
    description: 'The title used for "Style" category.'
    required: false
    default: '🎨 Code Style'
  cat-build:
    description: 'The title used for "Build/Packaging" category.'
    required: false
    default: '📦 Build/Packaging'
  cat-ci:
    description: 'The title used for "CI/CD" (Continuous integration/delivery) category.'
    required: false
    default: '🤖 CI/CD'
    # 👷
  cat-chore:
    description: 'The title used for "Chore/Maintenance" category.'
    required: false
    default: '🧹 Maintenance'
  cat-version:
    description: 'The title used for "Version" category.'
    required: false
    default: 'Version'
  cat-unclassified-multi:
    description: "The title used for an unclassified / \"Other Changes\" category, when any other categories are also detected for a release."
    required: false
    default: '🔀 Other changes'
  cat-unclassified-only:
    description: "The title used when only the unclassified / \"Other Changes\" category (and optionally, \"Version\") is detected for a release."
    required: false
    default: "⚙️ What's changed"
  cliff-config-file:
    description: |
      Provide an in-repo path to your own TOML file (e.g. "cliff.toml") with custom config for `orhun/git-cliff-action` (used internally to generate changelog).
      When provided, it completely replaces the template that comes with "Just release it!" - including all the detected categories, the release notes format... everything.
      When left empty, the bundled one is used.
    required: false
    default: ''
  skip-version-standardize:
    description: 'Skip standardizing the version for the release title/tag (see: Lex-DRL/standardize-version-action)'
    required: false
    default: 'false'
  skip-python-setup:
    description: 'Skip setup-python step if caller already did it.'
    required: false
    default: 'false'
  python-version:
    description: 'Python version to use internally.'
    required: false
    default: '3.x'
  is-pre-release:
    description: |
      Override pre-release status:
      - '' (empty, default) - let the version-standardizing step to decide (or 'false' if this step is skipped)
      - 'false' - force regular release
      - 'true' or any other value - force pre-release
    required: false
    default: ''
  is-draft:
    description: 'Create release as draft'
    required: false
    default: 'false'
  github-token:
    description: "GitHub API token (used for remote PR metadata by git-cliff + for the actual release)"
    required: false
    default: "${{ github.token }}"

#  skip-checkout:
#    description: 'true if caller already checked out the repo'
#    required: false
#    default: 'false'

outputs:
  tag:
    description: 'Final tag name (with "v" prefix if version was standardized, or the raw version extracted from TOML as-is)'
    value: ${{ steps.version-outputs.outputs.tag }}
  raw-version:
    description: 'Version without "v" prefix (if it was standardized, or the raw version extracted from TOML as-is)'
    value: ${{ steps.version-outputs.outputs.raw_version }}
  is-pre:
    description: 'Whether the release is marked as pre-release'
    value: ${{ steps.version-outputs.outputs.is_pre }}
  changelog:
    description: 'The auto-generated changelog (release notes)'
    value: ${{ steps.build-changelog.outputs.content }}

runs:
  using: "composite"
  steps:
#    - name: Checkout repository
#      if: inputs.skip-checkout != 'true'
#      uses: actions/checkout@v6
#      with:
#        fetch-depth: 0

    - name: Set up Python
      if: inputs.skip-python-setup == 'false' || inputs.skip-python-setup == ''
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
#        cache: 'pip'

    - name: ➡️ Extract version from 'pyproject.toml'
      id: toml-version
      uses: SebRollen/toml-action@v1.2.0
      with:
        file: ${{ inputs.project-toml-file }}
        field: ${{ inputs.project-toml-version-field }}

    - name: 🔢 Standardize Version
      id: standard-version
      if: inputs.skip-version-standardize == '' || inputs.skip-version-standardize == 'false'
      uses: Lex-DRL/standardize-version-action@main
      with:
        version: ${{ steps.toml-version.outputs.value }}
        skip-python-setup: true

    - name: Set version outputs (whether with standardization or not)
      id: version-outputs
      # To avoid unnecessary python setup, do it in pure bash:
      shell: bash
      run: |
        if [ -z '${{ inputs.skip-version-standardize }}' ] || [ '${{ inputs.skip-version-standardize }}' = 'false' ]; then
          echo 'tag=${{ steps.standard-version.outputs.v }}' >> "$GITHUB_OUTPUT"
          echo 'raw_version=${{ steps.standard-version.outputs.full }}' >> "$GITHUB_OUTPUT"
          if [ -z '${{ inputs.is-pre-release }}' ]; then
            echo 'is_pre=${{ steps.standard-version.outputs.is-pre }}' >> "$GITHUB_OUTPUT"
          elif [ '${{ inputs.is-pre-release }}' = 'false' ]; then
            echo 'is_pre=false' >> "$GITHUB_OUTPUT"
          else
            echo 'is_pre=true' >> "$GITHUB_OUTPUT"
          fi
        else
          echo 'tag=${{ steps.toml-version.outputs.value }}' >> "$GITHUB_OUTPUT"
          echo 'raw_version=${{ steps.toml-version.outputs.value }}' >> "$GITHUB_OUTPUT"
          if [ -z '${{ inputs.is-pre-release }}' ] || [ '${{ inputs.is-pre-release }}' = 'false' ]; then
            echo 'is_pre=false' >> "$GITHUB_OUTPUT"
          else
            echo 'is_pre=true' >> "$GITHUB_OUTPUT"
          fi
        fi

    - name: ⤏ Detect internal commits (from merged branch) to skip
      id: skip-commits
      shell: bash
      run: |
        # Find the previous tag (falls back to very first commit if none exists)
        PREV_TAG=$(
          git describe --tags --abbrev=0 --match "v[0-9]*" 2>/dev/null || \
          git describe --tags --abbrev=0 --match "[0-9]*.[0-9]*" 2>/dev/null || \
          echo ""
        )
        if [ -z "$PREV_TAG" ]; then
          RANGE="HEAD"
        else
          RANGE="${PREV_TAG}..HEAD"
        fi
        
        # All commits in range vs. first-parent-only (= main branch line)
        ALL=$(git log --format="%H" "$RANGE" 2>/dev/null || true)
        FIRST=$(git log --first-parent --format="%H" "$RANGE" 2>/dev/null || true)
        
        # Branch-internal commits = in ALL but not in FIRST
        BRANCH=$(comm -23 <(echo "$ALL" | sort) <(echo "$FIRST" | sort))
        
        # Build space-separated --skip-commit flags for git-cliff
        SKIP_ARGS=""
        while IFS= read -r sha; do
          [[ -n "$sha" ]] && SKIP_ARGS="$SKIP_ARGS --skip-commit $sha"
        done <<< "$BRANCH"
        # Strip leading space and export for the git-cliff step
        echo "CLIFF_SKIP_ARGS=${SKIP_ARGS# }" >> "$GITHUB_ENV"
        
        # Debug: how many commits are being excluded
        BRANCH_COUNT=$(echo "$BRANCH" | grep -c . 2>/dev/null || echo 0)
        echo "Skipping ${BRANCH_COUNT} branch-internal commit(s)"

    - name: Prepare default git-cliff configuration
      if: inputs.cliff-config-file == ''
      shell: bash
      run: |
        cat > /tmp/cliff.just-release-it.toml << 'EOT'
        [git]
        filter_unconventional = false
        sort_commits = "oldest"
        topo_order_commits = true
        protect_breaking_commits = true
        # This ^ prevents commits with `breaking = true` from being suppressed by any `{ ..., skip = true }` parser.
        # Skips aren't used in this template yet, but let's have it just as a fail-safe for the future.
        
        commit_parsers = [
          # Each category: PR-title field match first, then commit message match.
          # Field matches only fire when remote.pr_title is set (i.e., actual PR merges),
          # so they never interfere with regular commits.
        
          # The "<!-- X-Y -->" prefix in each group name sets their display order.
          # It's used only internally and never gets to the final output -
          # thanks to "striptags" in the template.
        
          # https://gitmoji.dev/
        
          # Order-1
          # ❗ Important warnings
        
          # 💥 Breaking Changes 💥
          # 1. Conventional breaking commits (feat!, fix!, BREAKING CHANGE footer) — native `cliff` field:
          { breaking = true, group = "<!-- 1-1 -->${{ inputs.cat-breaking }}" },
          # 2. PR titles starting with "breaking" or the same "prefix!" pattern:
          { field = "remote.pr_title", pattern = "(?i)^[^a-zA-Z0-9]*?(💥|❗|❕|‼️|‼|:boom:|[a-zA-Z_]+(\\([a-zA-Z_0-9-]+\\))?!\\s*:|break(s|ing)?\\b)", group = "<!-- 1-1 -->${{ inputs.cat-breaking }}" },
          { message = "(?i)^[^a-zA-Z0-9]*?(💥|❗|❕|‼️|‼|:boom:|[a-zA-Z_]+(\\([a-zA-Z_0-9-]+\\))?!\\s*:|break(s|ing)?\\b)", group = "<!-- 1-1 -->${{ inputs.cat-breaking }}" },
          # 3. Plain ^ commit messages with the same start
        
          # ⚠️ Deprecations
          { field = "remote.pr_title", pattern = "(?i)^[^a-zA-Z0-9]*?depr(ecat(ed?|ing|ion)?)?s?\\b", group = "<!-- 1-2 -->${{ inputs.cat-depr }}" },
          { message = "(?i)^[^a-zA-Z0-9]*?depr(ecat(ed?|ing|ion)?)?s?\\b", group = "<!-- 1-2 -->${{ inputs.cat-depr }}" },
        
          # ↩️ Rollbacks
          { field = "remote.pr_title", pattern = "(?i)^[^a-zA-Z0-9]*?(↩️|↩|↶|🔙|⏪️|⏪|:rewind:|(revert|undo|(rl|roll)\\s*(bk|back)s?)\\b)", group = "<!-- 1-3 -->${{ inputs.cat-revert }}" },
          { message = "(?i)^[^a-zA-Z0-9]*?(↩️|↩|↶|🔙|⏪️|⏪|:rewind:|(revert|undo|(rl|roll)\\s*(bk|back)s?)\\b)", group = "<!-- 1-3 -->${{ inputs.cat-revert }}" },
        
          # Order-2
          # 👨🏻 User-oriented updates
        
          # ✨ New Features
          { field = "remote.pr_title", pattern = "(?i)^[^a-zA-Z0-9]*?(✨|🌟|⭐|🎉|:sparkles:|:tada:|new(\\([a-zA-Z_0-9-]+\\))?!?\\s*:|(feat(ure)?|(add|support)(e?[ds]?|ing)?)\\b)", group = "<!-- 2-1 -->${{ inputs.cat-feat }}" },
          { message = "(?i)^[^a-zA-Z0-9]*?(✨|🌟|⭐|🎉|:sparkles:|:tada:|new(\\([a-zA-Z_0-9-]+\\))?!?\\s*:|(feat(ure)?|(add|support)(e?[ds]?|ing)?)\\b)", group = "<!-- 2-1 -->${{ inputs.cat-feat }}" },
        
          # 🚀 Improvements
          { field = "remote.pr_title", pattern = "(?i)^[^a-zA-Z0-9]*?(🚀|🚩|🚸|♿️|:rocket:|:triangular_flag_on_post:|:children_crossing:|:wheelchair:|(upd(ate[ds]?)?|chang(e[ds]?|ing)|(enhn?c?|enhance?|impr|improve?)(ment|mn?t?)?|(more\\s+)?(better|robust(ness)?))\\b)", group = "<!-- 2-2 -->${{ inputs.cat-enhance }}" },
          { message = "(?i)^[^a-zA-Z0-9]*?(🚀|🚩|🚸|♿️|:rocket:|:triangular_flag_on_post:|:children_crossing:|:wheelchair:|(upd(ate[ds]?)?|chang(e[ds]?|ing)|(enhn?c?|enhance?|impr|improve?)(ment|mn?t?)?|(more\\s+)?(better|robust(ness)?))\\b)", group = "<!-- 2-2 -->${{ inputs.cat-enhance }}" },
        
          # 🛠️ Fixes
          { field = "remote.pr_title", pattern = "(?i)^[^a-zA-Z0-9]*?(🛠️|🛠|🐛|🩹|🚑️|🚑|🚨|🥅|:bug:|:adhesive_bandage:|:ambulance:|:rotating_light:|:goal_net:|(bug(fix)?|fix(e?[ds]?|ing)?)\\b)", group = "<!-- 2-3 -->${{ inputs.cat-fix }}" },
          { message = "(?i)^[^a-zA-Z0-9]*?(🛠️|🛠|🐛|🩹|🚑️|🚑|🚨|🥅|:bug:|:adhesive_bandage:|:ambulance:|:rotating_light:|:goal_net:|(bug(fix)?|fix(e?[ds]?|ing)?)\\b)", group = "<!-- 2-3 -->${{ inputs.cat-fix }}" },
        
          # ⚡ Performance
          { field = "remote.pr_title", pattern = "(?i)^[^a-zA-Z0-9]*?(⚡️|⚡|:zap:|pe?rf(ormance)?\\b)", group = "<!-- 2-4 -->${{ inputs.cat-perf }}" },
          { message = "(?i)^[^a-zA-Z0-9]*?(⚡️|⚡|:zap:|pe?rf(ormance)?\\b)", group = "<!-- 2-4 -->${{ inputs.cat-perf }}" },
        
          # 🔒 Security
          { field = "remote.pr_title", pattern = "(?i)^[^a-zA-Z0-9]*?(🔒|🔐|🛡️|🛡|:lock:|:closed_lock_with_key:|sec(urity)?\\b)", group = "<!-- 2-5 -->${{ inputs.cat-security }}" },
          { message = "(?i)^[^a-zA-Z0-9]*?(🔒|🔐|🛡️|🛡|:lock:|:closed_lock_with_key:|sec(urity)?\\b)", group = "<!-- 2-5 -->${{ inputs.cat-security }}" },
        
          # Order-3
          # 👨🏻‍💻 Dev-oriented updates
        
          # 📝 Documentation
          { field = "remote.pr_title", pattern = "(?i)^[^a-zA-Z0-9]*?(📝|📄|💬|:memo:|:page_facing_up:|:speech_balloon:|(doc(ument)?(e?[ds]?|ing|ation)?|readme)\\b)", group = "<!-- 3-1 -->${{ inputs.cat-doc }}" },
          { message = "(?i)^[^a-zA-Z0-9]*?(📝|📄|💬|:memo:|:page_facing_up:|:speech_balloon:|(doc(ument)?(e?[ds]?|ing|ation)?|readme)\\b)", group = "<!-- 3-1 -->${{ inputs.cat-doc }}" },
        
          # ♻️ Refactor
          { field = "remote.pr_title", pattern = "(?i)^[^a-zA-Z0-9]*?(♻️|♻|🚚|:recycle:|:truck:|refac(tor(ing)?)?\\b)", group = "<!-- 3-2 -->${{ inputs.cat-refactor }}" },
          { message = "(?i)^[^a-zA-Z0-9]*?(♻️|♻|🚚|:recycle:|:truck:|refac(tor(ing)?)?\\b)", group = "<!-- 3-2 -->${{ inputs.cat-refactor }}" },
        
          # 🔬 Tests
          { field = "remote.pr_title", pattern = "(?i)^[^a-zA-Z0-9]*?(🔬|🧪|⚗️|✅|🦺|:test_tube:|:alembic:|:white_check_mark:|:safety_vest:|te?st(e?[ds]?|ing)?\\b)", group = "<!-- 3-3 -->${{ inputs.cat-test }}" },
          { message = "(?i)^[^a-zA-Z0-9]*?(🔬|🧪|⚗️|✅|🦺|:test_tube:|:alembic:|:white_check_mark:|:safety_vest:|te?st(e?[ds]?|ing)?\\b)", group = "<!-- 3-3 -->${{ inputs.cat-test }}" },
        
          # 🎨 Code Style
          { field = "remote.pr_title", pattern = "(?i)^[^a-zA-Z0-9]*?(🎨|:art:|(cd|code)?[^a-zA-Z0-9]*(fo?r?ma?t|sty?le?)(e?[ds]?|ing)?\\b)", group = "<!-- 3-4 -->${{ inputs.cat-style }}" },
          { message = "(?i)^[^a-zA-Z0-9]*?(🎨|:art:|(cd|code)?[^a-zA-Z0-9]*(fo?r?ma?t|sty?le?)(e?[ds]?|ing)?\\b)", group = "<!-- 3-4 -->${{ inputs.cat-style }}" },
        
          # 📦 Build/Packaging
          { field = "remote.pr_title", pattern = "(?i)^[^a-zA-Z0-9]*?(📦|:package:|bu?i?ld(s|ing)?\\b)", group = "<!-- 3-5 -->${{ inputs.cat-build }}" },
          { message = "(?i)^[^a-zA-Z0-9]*?(📦|:package:|bu?i?ld(s|ing)?\\b)", group = "<!-- 3-5 -->${{ inputs.cat-build }}" },
        
          # 🤖 CI/CD
          { field = "remote.pr_title", pattern = "(?i)^[^a-zA-Z0-9]*?(🤖|👷|:construction_worker:|c[id]\\b)", group = "<!-- 3-6 -->${{ inputs.cat-ci }}" },
          { message = "(?i)^[^a-zA-Z0-9]*?(🤖|👷|:construction_worker:|c[id]\\b)", group = "<!-- 3-6 -->${{ inputs.cat-ci }}" },
        
          # 🧹 Maintenance
          { field = "remote.pr_title", pattern = "(?i)^[^a-zA-Z0-9]*?(🧹|🙈|💸|:see_no_evil:|:money_with_wings:|(cho?re?|clean(up)?|maint[ae]i?n([ae]n?ce)?|git(hub|ignore|att?ri?b?u?t?e?s?)?)\\b)", group = "<!-- 3-7 -->${{ inputs.cat-chore }}" },
          { message = "(?i)^[^a-zA-Z0-9]*?(🧹|🙈|💸|:see_no_evil:|:money_with_wings:|(cho?re?|clean(up)?|maint[ae]i?n([ae]n?ce)?|git(hub|ignore|att?ri?b?u?t?e?s?)?)\\b)", group = "<!-- 3-7 -->${{ inputs.cat-chore }}" },
        
          # Order-9
          # Always last
        
          # Version-related changes:
          # Caught BEFORE the catch-all, inserted after
          { field = "remote.pr_title", pattern = "(?i)^[^a-zA-Z0-9]*?(🔖|🏷️|🏷|:bookmark:|:label:|(v(er)?[^a-zA-Z0-9]*[0-9]+|ver(sion)?|bump|release)\\b)", group = "<!-- 9-2 -->${{ inputs.cat-version }}" },
          { message = "(?i)^[^a-zA-Z0-9]*?(🔖|🏷️|🏷|:bookmark:|:label:|(v(er)?[^a-zA-Z0-9]*[0-9]+|ver(sion)?|bump|release)\\b)", group = "<!-- 9-2 -->${{ inputs.cat-version }}" },
        
          # Catch-all:
          # Everything else (uncategorized commits / PR merges).
          # Internal group name is hard-coded, and the actual title is used later in the template, depending on the presence of other (properly classified) categories
          { message = ".*", group = "<!-- 9-1 -->🔀 Changes" },
        ]
        
        [remote.github]
        owner = "${{ github.repository_owner }}"
        repo = "${{ github.event.repository.name }}"
        
        [changelog]
        trim = true
        header = ""
        footer = ""
        body = """
        {%- set grouped = commits | group_by(attribute="group") -%}
        {%- set has_specific = false -%}
        {%- for g, gc in grouped -%}
          {%- set dg = g | striptags | trim | upper_first -%}
          {%- if dg != "🔀 Changes" and dg != "${{ inputs.cat-version }}" -%}
            {%- set_global has_specific = true -%}
          {%- endif -%}
        {%- endfor -%}
        {%- for group, commits in grouped -%}
        {%- set display_group = group | striptags | trim | upper_first -%}
        {% if display_group == "🔀 Changes" -%}
        {%- if has_specific %}## ${{ inputs.cat-unclassified-multi }}{% else %}## ${{ inputs.cat-unclassified-only }}{% endif %}
        {%- else %}
        ## {{ display_group }}
        {%- endif %}
        
        {% for commit in commits %}
        {%- set msg = commit.message | trim -%}
        {%- set title = msg | split(pat="\n") | first | trim -%}
        {%- set cbody = msg | split(pat="\n") | slice(start=1) | join(sep="\n") | trim -%}
        {%- set sha7 = commit.id | truncate(length=7, end="") -%}
        {%- set who = commit.remote.username | default(value=commit.author.name) -%}
        - {% if commit.remote.pr_number -%}
        {{ commit.remote.pr_title | default(value=title) }} — #{{ commit.remote.pr_number }} by @{{ who }}
        {%- else -%}
        {{ title }} — {{ commit.id }} by @{{ who }}
        {%- if cbody %}
        {{ "  > " ~ cbody | replace(from="\n", to="\n  > ") }}
        {%- endif %}
        {%- endif %}
        {% endfor %}
        {% endfor %}
        """
        EOT

    - name: 📝 Build changelog with git-cliff ⛰️
      id: build-changelog
      uses: orhun/git-cliff-action@v4
      with:
#        version: ${{ steps.version-outputs.outputs.raw_version }}  # version of cliff itself
        config: ${{ inputs.cliff-config-file != '' && inputs.cliff-config-file || '/tmp/cliff.just-release-it.toml' }}
        args: --unreleased --strip all ${{ env.CLIFF_SKIP_ARGS }}
      env:
        OUTPUT: '${{ runner.temp }}/changelog.just-release-it.md'
        GITHUB_REPO: ${{ github.repository }}
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN || inputs.github-token || github.token }}

#    - name: 🔄 Create GitHub Release
    - name: 📦 Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.version-outputs.outputs.tag }}
        name: ${{ steps.version-outputs.outputs.tag }}
        body: ${{ steps.build-changelog.outputs.content }}
        files: ${{ inputs.attach-files }}
        draft: ${{ inputs.is-draft }}
        prerelease: ${{ steps.version-outputs.outputs.is_pre }}
        token: ${{ env.GITHUB_TOKEN || inputs.github-token || github.token }}
        # Other defaults to possibly expose as inputs later:
        # make_latest: 'auto'     # GitHub decides based on prerelease/draft
